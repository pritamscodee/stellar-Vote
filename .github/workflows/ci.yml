name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short

jobs:
  frontend:
    name: Frontend — Build, Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  contract-poll:
    name: Contract (Poll) — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/poll
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32v1-none
          toolchain: stable
      - name: Build contract
        run: |
          for i in 1 2 3; do
            cargo build --target wasm32v1-none --release && break
            sleep 5
          done
      - name: Run tests
        run: |
          for i in 1 2 3; do
            cargo test && break
            sleep 5
          done

  contract-reward:
    name: Contract (Reward) — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/reward
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32v1-none
          toolchain: stable
      - name: Build poll contract WASM (needed for contractimport)
        working-directory: contracts/poll
        run: |
          for i in 1 2 3; do
            cargo build --target wasm32v1-none --release && break
            sleep 5
          done
      - name: Build reward contract
        run: |
          for i in 1 2 3; do
            cargo build --target wasm32v1-none --release && break
            sleep 5
          done
      - name: Run tests
        run: |
          for i in 1 2 3; do
            cargo test && break
            sleep 5
          done

  backend:
    name: Backend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build backend
        run: |
          for i in 1 2 3; do
            cargo build --release && break
            sleep 5
          done
